name: Update Game Trends Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: update-parser
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser
        run: cd scripts && python update_data.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Update status.json
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone
          rockets_count = 0
          try:
              with open("meta.json") as f:
                  rockets_count = json.load(f).get("rockets_count", 0)
          except:
              pass
          failed = os.environ.get("RUNNER_RESULT", "") == "failure"
          with open("status.json", "w") as f:
              json.dump({
                  "running": False,
                  "last_run": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "rockets_count": rockets_count,
                  "error": failed
              }, f)
          PYEOF

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "data: обновление $(date -u +%Y-%m-%d)"
          git push
