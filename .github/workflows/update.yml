name: Update Game Trends Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: update-parser
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser
        id: parser
        run: |
          cd scripts && python update_data.py 2>&1
          # Проверяем результат
          python3 - <<'PYEOF'
          import json, sys
          try:
              with open("../rockets.json") as f:
                  d = json.load(f)
              rockets = d.get("rockets", d) if isinstance(d, dict) else d
              count = len(rockets)
              print(f"✅ Парсер нашёл {count} ракет")
              if count == 0:
                  print("❌ Ноль ракет — не публикуем")
                  sys.exit(1)
          except Exception as e:
              print(f"❌ Ошибка: {e}")
              sys.exit(1)
          PYEOF
        env:
          PYTHONUNBUFFERED: "1"

      - name: Update status.json
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json
          from datetime import datetime, timezone
          rockets_count = 0
          try:
              with open("meta.json") as f:
                  rockets_count = json.load(f).get("rockets_count", 0)
          except:
              pass
          with open("status.json", "w") as f:
              json.dump({
                  "running": False,
                  "last_run": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "rockets_count": rockets_count,
              }, f)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rockets.json hype.json videos.json news.json ideas.json meta.json status.json all_rockets_history.json
          git diff --cached --quiet && echo "Нет изменений" && exit 0
          git commit -m "data: обновление $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
