name: Update Game Trends Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: update-parser
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backup current data
        run: |
          cp rockets.json rockets_backup.json 2>/dev/null || echo '{"rockets":[],"watchlist":[]}' > rockets_backup.json
          echo "Бекап создан"

      - name: Run parser
        run: cd scripts && python update_data.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Validate new data vs backup
        run: |
          python3 - <<'PYEOF'
          import json, sys, shutil

          def count_rockets(path):
              try:
                  with open(path) as f:
                      d = json.load(f)
                  return len(d.get("rockets", d) if isinstance(d, dict) else d)
              except:
                  return 0

          old_count = count_rockets("rockets_backup.json")
          new_count = count_rockets("rockets.json")

          print(f"Было ракет: {old_count}")
          print(f"Стало ракет: {new_count}")

          # Если старых данных не было — принимаем любой результат
          if old_count == 0:
              print("✅ Первый запуск, принимаем данные")
              sys.exit(0)

          # Новых должно быть не меньше 40% от старых
          threshold = old_count * 0.4
          if new_count < threshold:
              print(f"⚠️ Новых данных слишком мало ({new_count} < {threshold:.0f}). Восстанавливаю предыдущие.")
              shutil.copy("rockets_backup.json", "rockets.json")
              # Не падаем — просто восстанавливаем старые данные
          else:
              print(f"✅ Данные валидны: {new_count} ракет")

          PYEOF

      - name: Update status.json
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json
          from datetime import datetime, timezone
          rockets_count = 0
          try:
              with open("meta.json") as f:
                  rockets_count = json.load(f).get("rockets_count", 0)
          except:
              pass
          with open("status.json", "w") as f:
              json.dump({
                  "running": False,
                  "last_run": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "rockets_count": rockets_count,
              }, f)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --cached rockets_backup.json 2>/dev/null || true
          git add rockets.json hype.json videos.json news.json ideas.json meta.json status.json all_rockets_history.json
          git diff --cached --quiet || git commit -m "data: обновление $(date -u +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
